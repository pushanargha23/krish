name: Deploy React App to Hostinger

on:
  push:
    branches:
      - main # Change this if your default branch is different (e.g., master)

jobs:
  web-deploy:
    name: Build and Deploy to Hostinger
    runs-on: ubuntu-latest

    steps:
      - name: Checkout the Repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: './Krishhiv Realtors/client/package-lock.json'

      - name: Install Dependencies
        working-directory: './Krishhiv Realtors/client'
        run: npm ci || npm install

      - name: Build the React Application
        working-directory: './Krishhiv Realtors/client'
        run: npm run build

      - name: Deploy to Hostinger via FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          local-dir: './Krishhiv Realtors/client/dist/'
          server-dir: './public_html/' # Change if you are deploying to a subdomain folder
